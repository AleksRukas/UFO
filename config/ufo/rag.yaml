# RAG (Retrieval Augmented Generation) Configuration for Server

# config/ufo/rag.yaml

KNOWLEDGE_RETRIEVAL:
  # Enable the Knowledge Substrate
  ENABLED: true
  
  # The path to your folder containing Audacity/Legacy manuals
  # You can use an absolute path or relative to the UFO root
  KNOWLEDGE_DIRECTORY: "C:/Users/YourName/Documents/AppManuals/Legacy"
  
  # Settings for indexing your manuals
  INDEX_SETTINGS:
    ALLOWED_EXTENSIONS: ["pdf", "docx", "txt", "md"]
    CHUNK_SIZE: 500         # Smaller chunks for better precision in old manuals
    CHUNK_OVERLAP: 50
    
  # Vector Database (Where UFO stores the "searchable" version of your docs)
  VECTOR_DB:
    TYPE: "chroma"         # Standard local vector DB for UFO
    PERSIST_DIRECTORY: "./data/vector_db/app_knowledge"

  # The model used to vectorize your manuals
  EMBEDDING_MODEL:
    API_TYPE: "openai"     # Or "gemini", "aoai"
    API_KEY: "${OPENAI_API_KEY}" # Best practice: use env variables
    MODEL_NAME: "text-embedding-3-small"
